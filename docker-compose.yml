version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: ca_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: creator_academy
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wp_net

  wordpress:
    image: wordpress:latest
    container_name: ca_wordpress
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_password
      WORDPRESS_DB_NAME: creator_academy
      WORDPRESS_TABLE_PREFIX: ca_
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes/creator-academy:/var/www/html/wp-content/themes/creator-academy
    networks:
      - wp_net

  wpcli:
    image: wordpress:cli
    container_name: ca_wpcli
    depends_on:
      - db
      - wordpress
    user: "33:33"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_password
      WORDPRESS_DB_NAME: creator_academy
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes/creator-academy:/var/www/html/wp-content/themes/creator-academy
      - ./scripts:/scripts
    networks:
      - wp_net
    entrypoint: /bin/sh
    command: "-c 'sleep infinity'"

volumes:
  db_data:
  wp_data:

networks:
  wp_net:
